# Server Configuration
server.port=8080
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# MySQL Configuration (Laragon Port: 3007)
spring.datasource.url=jdbc:mysql://localhost:3007/equipment_rental_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&tinyInt1isBit=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT (set via environment variables in production)
app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
app.jwt.access-ttl-seconds=${APP_JWT_ACCESS_TTL_SECONDS:1800}

# Token TTLs
app.refresh.ttl-seconds=${APP_REFRESH_TTL_SECONDS:2592000}
app.verification.ttl-seconds=${APP_VERIFICATION_TTL_SECONDS:86400}
app.reset.ttl-seconds=${APP_RESET_TTL_SECONDS:3600}
app.reset.otp-ttl-seconds=${APP_RESET_OTP_TTL_SECONDS:300}
app.verification.otp-ttl-seconds=${APP_VERIFICATION_OTP_TTL_SECONDS:600}

# Resend SMTP
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
# TEMP (local testing): hardcoded Resend SMTP API key
spring.mail.password=re_VHQWWD4x_QEQzoacacusLXUCxQmjFpJEh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Trust SMTP host TLS (fixes PKIX cert path errors in some environments)
spring.mail.properties.mail.smtp.ssl.trust=smtp.resend.com
app.mail.from=${MAIL_FROM:no-reply@cloudbase.website}